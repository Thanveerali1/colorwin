services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: colorwin
      POSTGRES_PASSWORD: colorwin_dev_pw
      POSTGRES_DB: colorwin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
